    footActions = `<button class="btn ghost" id="modal-cancel">Cancel</button><button class="btn" style="background:var(--brick); border-color:var(--brick); color:#fff;" id="modal-confirm-delete">Delete</button>`;
  } else if(m.type==='file-options'){
    title = 'File Storage';
    body = `
      <div class="setup-options">
        <button class="setup-opt" id="fo-new">
          <div class="setup-opt-ico">📄</div>
          <div class="setup-opt-text"><strong>Create a new data file</strong><span>Start a fresh file — your current data stays in browser storage</span></div>
        </button>
        <button class="setup-opt" id="fo-open">
          <div class="setup-opt-ico">📂</div>
          <div class="setup-opt-text"><strong>Open a different data file</strong><span>Switch to another PMS Tracker file</span></div>
        </button>
        ${STATE.fileHandle?`
        <button class="setup-opt" id="fo-disconnect">
          <div class="setup-opt-ico">🔌</div>
          <div class="setup-opt-text"><strong>Disconnect this file</strong><span>Stop saving to ${escapeHtml(STATE.fileHandle.name||'this file')} — switch to browser storage only</span></div>
        </button>`:''}
        <button class="setup-opt" id="fo-clear-all" style="border-color:var(--brick-bg);">
          <div class="setup-opt-ico">🗑️</div>
          <div class="setup-opt-text"><strong>Clear all data</strong><span>Delete every vehicle, Feeder entry, and ODO snapshot — cannot be undone</span></div>
        </button>
      </div>`;
    footActions = `<button class="btn ghost" id="modal-cancel">Cancel</button>`;
  } else if(m.type==='confirm-clear-all'){
    title = 'Clear All Data';
    body = `<p style="font-size:13.5px; line-height:1.6;">This deletes <strong>all ${STATE.data.vehicles.length} vehicles</strong>, all Feeder entries, and all ODO snapshot history — from this file/browser storage. This cannot be undone. Consider exporting to Excel first.</p>`;
    footActions = `<button class="btn ghost" id="modal-cancel">Cancel</button><button class="btn" style="background:var(--brick); border-color:var(--brick); color:#fff;" id="modal-confirm-clear-all">Delete Everything</button>`;
  } else if(m.type==='high-risk-settings'){
    title = 'High Risk Bucket Settings';
    const hr = STATE.highRiskSettings;
    const renderChecklist = (groupKey, labels, selected) => labels.map(l=>`
      <label style="display:flex; align-items:center; gap:8px; padding:5px 0; font-size:12.5px;">
        <input type="checkbox" class="hr-check" data-group="${groupKey}" value="${escapeHtml(l)}" ${selected.includes(l)?'checked':''}>
        ${escapeHtml(l)}
      </label>`).join('');
    body = `
      <p class="helptext" style="margin-bottom:14px;">Tick which deviation buckets count as "High Risk" for each category. Defaults match the original Excel exactly — change anytime, e.g. per partner conversation.</p>
      <div class="section-label">Done against Due — Overall</div>
      ${renderChecklist('doneAgainstDueOverall', DONE_BUCKET_LABELS, hr.doneAgainstDueOverall)}
      <div class="section-label">Done against Due — Post Due</div>
      ${renderChecklist('doneAgainstDuePostDue', DONE_BUCKET_LABELS, hr.doneAgainstDuePostDue)}
      <div class="section-label">Done against Due — Before Due</div>
      ${renderChecklist('doneAgainstDueBeforeDue', DONE_BUCKET_LABELS, hr.doneAgainstDueBeforeDue)}
      <div class="section-label">Done against Not Due</div>
      ${renderChecklist('doneAgainstNotDue', DONE_BUCKET_LABELS, hr.doneAgainstNotDue)}
    `;
    footActions = `<button class="btn ghost" id="modal-cancel">Cancel</button><button class="btn ghost sm" id="modal-reset-hr">Reset to Default</button><button class="btn amber" id="modal-save-hr">Save Settings</button>`;
  }
  return `
  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <div class="modal-head"><h3>${title}</h3><button class="close-x" id="modal-x">✕</button></div>
      <div class="modal-body">${body}</div>
      <div class="modal-foot">${footActions}</div>
    </div>
  </div>`;
}

function closeModal(){ STATE.ui.modal=null; render(); }

/* ------------------------------- Event binding ------------------------------ */

function bindAppEvents(){
  // sidebar nav
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.onclick = ()=>{ STATE.page = el.dataset.page; render(); };
  });
  const connectBtn = document.getElementById('sb-connect');
  if(connectBtn) connectBtn.onclick = ()=>{ STATE.ui.modal={type:'file-options'}; render(); };
  const exportBtn = document.getElementById('sb-export');
  if(exportBtn) exportBtn.onclick = exportFullExcel;

  // topbar (vehicles page)
  const tplBtn = document.getElementById('tb-template'); if(tplBtn) tplBtn.onclick = downloadVehicleTemplate;
  const uploadInput = document.getElementById('tb-upload');
  if(uploadInput) uploadInput.onchange = (e)=>{ if(e.target.files[0]) handleVehicleExcelUpload(e.target.files[0]); };
  const addVBtn = document.getElementById('tb-add-vehicle'); if(addVBtn) addVBtn.onclick = ()=>{ STATE.ui.modal={type:'vehicle-form', vehicle:null}; render(); };
  const downloadConsBtn = document.getElementById('tb-download-consolidated'); if(downloadConsBtn) downloadConsBtn.onclick = exportConsolidatedOnly;
  const emptyAddBtn = document.getElementById('empty-add-vehicle'); if(emptyAddBtn) emptyAddBtn.onclick = ()=>{ STATE.ui.modal={type:'vehicle-form', vehicle:null}; render(); };

  // vehicle table actions
  document.querySelectorAll('[data-vehicle-detail]').forEach(el=>{
    el.onclick = ()=>{ STATE.ui.modal={type:'vehicle-detail', vehicleId:el.dataset.vehicleDetail}; render(); };
  });
  document.querySelectorAll('[data-edit-vehicle]').forEach(el=>{
    el.onclick = ()=>{ const v = STATE.data.vehicles.find(x=>x.id===el.dataset.editVehicle); STATE.ui.modal={type:'vehicle-form', vehicle:v}; render(); };
  });
  document.querySelectorAll('[data-del-vehicle]').forEach(el=>{
    el.onclick = ()=>{ const v = STATE.data.vehicles.find(x=>x.id===el.dataset.delVehicle); STATE.ui.modal={type:'confirm-delete', vehicleId:v.id, vehicleNumber:v.vehicleNumber}; render(); };
  });

  // feeder
  const ffSubmit = document.getElementById('ff-submit');
  if(ffSubmit) ffSubmit.onclick = ()=>{
    const form = {
      vehicleNumber: document.getElementById('ff-vehicleNumber').value.trim(),
      gpsOdo: document.getElementById('ff-gpsOdo').value,
      doneDate: document.getElementById('ff-doneDate').value,
      doneKm: document.getElementById('ff-doneKm').value,
      serviceNumber: document.getElementById('ff-serviceNumber').value
    };
    if(!form.vehicleNumber){ toast('Vehicle Number is required.', 'err'); return; }
    const snapDateEl = document.getElementById('ff-snapshot-date');
    const snapshotDate = (snapDateEl && snapDateEl.value) || toISO(new Date());
    const ok = submitFeederEntry(form, snapshotDate);
    if(ok){ render(); }
  };
  const ffSnapDate = document.getElementById('ff-snapshot-date');
  if(ffSnapDate) ffSnapDate.onchange = (e)=>{ STATE.ui.feederSnapshotDate = e.target.value; };
  const ffTemplate = document.getElementById('ff-template');
  if(ffTemplate) ffTemplate.onclick = downloadFeederTemplate;
  const ffBulkUpload = document.getElementById('ff-bulk-upload');
  if(ffBulkUpload) ffBulkUpload.onchange = (e)=>{
    if(!e.target.files[0]) return;
    const snapDateEl = document.getElementById('ff-snapshot-date');
    const snapshotDate = (snapDateEl && snapDateEl.value) || toISO(new Date());
    STATE.ui.feederSnapshotDate = snapshotDate;
    handleFeederExcelUpload(e.target.files[0], snapshotDate);
  };

  // summary filter
  const sumFilter = document.getElementById('sum-filter');
  if(sumFilter) sumFilter.oninput = (e)=>{ STATE.ui.summaryFilter = e.target.value; render(); setTimeout(()=>{ const f=document.getElementById('sum-filter'); if(f){f.focus(); f.setSelectionRange(f.value.length,f.value.length);} },0); };
  const sumMapcode = document.getElementById('sum-mapcode');
  if(sumMapcode) sumMapcode.onchange = (e)=>{ STATE.ui.summaryMapcodeFilter = e.target.value; render(); };
  const sumPartner = document.getElementById('sum-partner');
  if(sumPartner) sumPartner.onchange = (e)=>{ STATE.ui.summaryPartnerFilter = e.target.value; render(); };
  const sumAsof = document.getElementById('sum-asof');
  if(sumAsof) sumAsof.onchange = (e)=>{ STATE.ui.summaryAsOfDate = e.target.value; render(); };
  const sumDueOnly = document.getElementById('sum-dueonly');
  if(sumDueOnly) sumDueOnly.onchange = (e)=>{ STATE.ui.summaryDueOnly = e.target.checked; render(); };

  // charts filters
  const chMapcode = document.getElementById('ch-mapcode');
  if(chMapcode) chMapcode.onchange = (e)=>{ STATE.ui.chartsMapcodeFilter = e.target.value; render(); };
  const chPartner = document.getElementById('ch-partner');
  if(chPartner) chPartner.onchange = (e)=>{ STATE.ui.chartsPartnerFilter = e.target.value; render(); };
  const chDateFrom = document.getElementById('ch-date-from');
  if(chDateFrom) chDateFrom.onchange = (e)=>{ STATE.ui.chartsDateFrom = e.target.value; render(); };
  const chDateTo = document.getElementById('ch-date-to');
  if(chDateTo) chDateTo.onchange = (e)=>{ STATE.ui.chartsDateTo = e.target.value; render(); };
  const chGroupBy = document.getElementById('ch-group-by');
  if(chGroupBy){
    chGroupBy.value = STATE.ui.chartsGroupBy;
    chGroupBy.onchange = (e)=>{ STATE.ui.chartsGroupBy = e.target.value; render(); };
  }
  const chClear = document.getElementById('ch-clear');
  if(chClear) chClear.onclick = ()=>{
    STATE.ui.chartsMapcodeFilter=''; STATE.ui.chartsPartnerFilter=''; STATE.ui.chartsDateFrom=''; STATE.ui.chartsDateTo='';
    render();
  };

  // adh report page
  const adhPartnerSel = document.getElementById('adh-partner');
  if(adhPartnerSel) adhPartnerSel.onchange = (e)=>{ STATE.ui.adhPartner = e.target.value; render(); };
  const adhModeMonth = document.getElementById('adh-mode-month');
  if(adhModeMonth) adhModeMonth.onclick = ()=>{ STATE.ui.adhMode = 'month'; render(); };
  const adhModeYear = document.getElementById('adh-mode-year');
  if(adhModeYear) adhModeYear.onclick = ()=>{ STATE.ui.adhMode = 'year'; render(); };
  const adhYearSel = document.getElementById('adh-year');
  if(adhYearSel) adhYearSel.onchange = (e)=>{ STATE.ui.adhYear = parseInt(e.target.value,10); render(); };
  const adhMonthSel = document.getElementById('adh-month');
  if(adhMonthSel) adhMonthSel.onchange = (e)=>{ STATE.ui.adhMonth = parseInt(e.target.value,10); render(); };
  const adhDrillMapcode = document.getElementById('adh-drill-mapcode');
  if(adhDrillMapcode) adhDrillMapcode.onchange = (e)=>{ STATE.ui.adhMapcode = e.target.value; render(); };
  const adhSettingsBtn = document.getElementById('adh-settings-btn');
  if(adhSettingsBtn) adhSettingsBtn.onclick = ()=>{ STATE.ui.modal={type:'high-risk-settings'}; render(); };
  const adhExportPartner = document.getElementById('adh-export-partner');
  if(adhExportPartner) adhExportPartner.onclick = ()=>{ exportPartnerReport(STATE.ui.adhPartner || '__ALL__'); };

  // consolidated filter
  const consFilter = document.getElementById('cons-filter');
  if(consFilter) consFilter.oninput = (e)=>{ STATE.ui.consolidatedFilter = e.target.value; render(); setTimeout(()=>{ const f=document.getElementById('cons-filter'); if(f){f.focus(); f.setSelectionRange(f.value.length,f.value.length);} },0); };
  const consMapcode = document.getElementById('cons-mapcode');
  if(consMapcode) consMapcode.onchange = (e)=>{ STATE.ui.consolidatedMapcodeFilter = e.target.value; render(); };
  const consPartner = document.getElementById('cons-partner');
  if(consPartner) consPartner.onchange = (e)=>{ STATE.ui.consolidatedPartnerFilter = e.target.value; render(); };

  // modal
  const modalBg = document.getElementById('modal-bg');
  if(modalBg) modalBg.onclick = (e)=>{ if(e.target.id==='modal-bg') closeModal(); };
  const modalX = document.getElementById('modal-x'); if(modalX) modalX.onclick = closeModal;
  const modalCancel = document.getElementById('modal-cancel'); if(modalCancel) modalCancel.onclick = closeModal;

  const foNew = document.getElementById('fo-new'); if(foNew) foNew.onclick = async ()=>{ closeModal(); await connectNewFile(); };
  const foOpen = document.getElementById('fo-open'); if(foOpen) foOpen.onclick = async ()=>{ closeModal(); await openExistingFile(); };
  const foDisconnect = document.getElementById('fo-disconnect'); if(foDisconnect) foDisconnect.onclick = async ()=>{ closeModal(); await disconnectFile(); };
  const foClearAll = document.getElementById('fo-clear-all'); if(foClearAll) foClearAll.onclick = ()=>{ STATE.ui.modal={type:'confirm-clear-all'}; render(); };
  const confirmClearAll = document.getElementById('modal-confirm-clear-all');
  if(confirmClearAll) confirmClearAll.onclick = ()=>{
    STATE.data.vehicles = [];
    STATE.data.services = [];
    STATE.data.odoSnapshots = [];
    writeToFile();
    toast('All data cleared.', '');
    closeModal();
  };

  const modalSaveHr = document.getElementById('modal-save-hr');
  if(modalSaveHr) modalSaveHr.onclick = ()=>{
    const checks = document.querySelectorAll('.hr-check');
    const grouped = { doneAgainstDueOverall:[], doneAgainstDuePostDue:[], doneAgainstDueBeforeDue:[], doneAgainstNotDue:[] };
    checks.forEach(c=>{ if(c.checked) grouped[c.dataset.group].push(c.value); });
    STATE.highRiskSettings = grouped;
    writeToFile();
    toast('High Risk settings saved.', 'ok');
    closeModal();
  };
  const modalResetHr = document.getElementById('modal-reset-hr');
  if(modalResetHr) modalResetHr.onclick = ()=>{
    STATE.highRiskSettings = JSON.parse(JSON.stringify(DEFAULT_HIGH_RISK_SETTINGS));
    writeToFile();
    toast('High Risk settings reset to default.', '');
    STATE.ui.modal={type:'high-risk-settings'};
    render();
  };

  const saveVBtn = document.getElementById('modal-save-vehicle');
  if(saveVBtn) saveVBtn.onclick = ()=>{
    const vehicleNumber = document.getElementById('f-vehicleNumber').value.trim();
    if(!vehicleNumber){ toast('Vehicle Number is required.', 'err'); return; }
    const saleDate = document.getElementById('f-saleDate').value;
    if(!saleDate){ toast('Sale Date is required.', 'err'); return; }
    const editing = STATE.ui.modal.vehicle;
    const dupe = STATE.data.vehicles.find(v=> v.vehicleNumber.toLowerCase()===vehicleNumber.toLowerCase() && (!editing || v.id!==editing.id));
    if(dupe){ toast('A vehicle with this number already exists.', 'err'); return; }

    const payload = {
      vehicleNumber,
      partnerName: document.getElementById('f-partnerName').value.trim(),
      mapcode: document.getElementById('f-mapcode').value.trim(),
      makeModel: document.getElementById('f-makeModel').value.trim(),
      saleDate,
      km1: numOrZero(document.getElementById('f-km1').value) || 1000,
      kmInc2: numOrZero(document.getElementById('f-kmInc2').value) || 4000,
      kmInc3: numOrZero(document.getElementById('f-kmInc3').value) || 5000,
      kmFlat: numOrZero(document.getElementById('f-kmFlat').value) || 10000,
      day1: numOrZero(document.getElementById('f-day1').value) || 30,
      dayInc2: numOrZero(document.getElementById('f-dayInc2').value) || 150,
      dayInc3: numOrZero(document.getElementById('f-dayInc3').value) || 185,
      dayFlat: numOrZero(document.getElementById('f-dayFlat').value) || 365
    };
    if(editing){
      Object.assign(editing, payload);
      toast('Vehicle updated.', 'ok');
    } else {
      STATE.data.vehicles.push({id:uid(), sno:STATE.data.vehicles.length+1, ...payload});
      toast('Vehicle added.', 'ok');
    }
    writeToFile();
    closeModal();
  };

  const confirmDelBtn = document.getElementById('modal-confirm-delete');
  if(confirmDelBtn) confirmDelBtn.onclick = ()=>{
    const id = STATE.ui.modal.vehicleId;
    STATE.data.vehicles = STATE.data.vehicles.filter(v=>v.id!==id);
    STATE.data.services = STATE.data.services.filter(s=>s.vehicleId!==id);
    writeToFile();
    toast('Vehicle deleted.', '');
    closeModal();
  };
}

/* --------------------------------- Boot ------------------------------------ */

async function boot(){
  document.getElementById('root').innerHTML = `
    <div class="setup-screen"><div style="text-align:center; color:var(--slate); font-size:13px;">Loading…</div></div>`;
  const reconnected = await tryReconnectLastFile();
  if(!reconnected){
    // No file reconnect possible — fall back to local data if present, but
    // still show the setup screen so the user can choose how to proceed.
    loadFromLocalStorage();
  }
  render();
}
boot();
</script>
</body>
</html>
