<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMS Tracker — Periodic Maintenance Service</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  :root{
    --ink:#15233B;
    --sidebar-bg:#002E86;
    --ink-soft:#2A3B57;
    --paper:#FAF7F0;
    --paper-raised:#FFFFFF;
    --line:#E4DECE;
    --line-soft:#EEE9DC;
    --slate:#5C6B7A;
    --slate-soft:#8A95A3;
    --amber:#D97D3D;
    --amber-bg:#FBEADB;
    --forest:#3C7A5C;
    --forest-bg:#E2EFE7;
    --brick:#B5453E;
    --brick-bg:#F8E2E0;
    --gold:#C9A227;
    --gold-bg:#F6EFD6;
    --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
    --radius: 8px;
    --shadow-sm: 0 1px 2px rgba(21,35,59,0.06);
    --shadow-md: 0 4px 16px rgba(21,35,59,0.10);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:var(--font-ui);
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    font-size:14px;
  }
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  /* ===== App shell ===== */
  #app{display:flex; min-height:100vh;}

  /* ===== Sidebar ===== */
  #sidebar{
    width:232px;
    flex-shrink:0;
    background:var(--sidebar-bg);
    color:#D8DEE9;
    display:flex;
    flex-direction:column;
    position:fixed;
    top:0; left:0; bottom:0;
    z-index:40;
  }
  .brand{
    padding:22px 20px 18px;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .brand-mark{
    font-family:var(--font-mono);
    font-size:14px;
    letter-spacing:0.1em;
    color:var(--amber);
    font-weight:700;
  }
  .brand-dept{
    font-size:11px;
    letter-spacing:0.08em;
    color:#9DB0D4;
    font-weight:600;
    text-transform:uppercase;
    margin-top:2px;
  }
  .brand-name{
    font-size:17px;
    font-weight:700;
    color:#fff;
    margin-top:6px;
    letter-spacing:-0.01em;
  }
  .brand-sub{
    font-size:11.5px;
    color:#8190A8;
    margin-top:2px;
  }

  nav{padding:14px 12px; flex:1;}
  .nav-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    border-radius:7px;
    color:#AEB9CB;
    text-decoration:none;
    font-size:13.5px;
    font-weight:500;
    margin-bottom:2px;
    cursor:pointer;
    transition:background 0.12s, color 0.12s;
    border:none;
    background:none;
    width:100%;
    text-align:left;
  }
  .nav-item:hover{background:rgba(255,255,255,0.06); color:#fff;}
  .nav-item.active{background:rgba(217,125,61,0.16); color:#fff;}
  .nav-item.active .nav-ico{color:var(--amber);}
  .nav-ico{width:16px; text-align:center; flex-shrink:0; font-size:14px;}
  .nav-count{
    margin-left:auto;
    font-family:var(--font-mono);
    font-size:11px;
    background:rgba(255,255,255,0.08);
    padding:1px 6px;
    border-radius:10px;
    color:#9DA8BC;
  }
  .nav-item.active .nav-count{background:var(--amber); color:var(--ink);}

  .nav-arrow{
    text-align:center;
    color:rgba(255,255,255,0.25);
    font-size:11px;
    line-height:1;
    margin:1px 0;
    user-select:none;
  }

  .sidebar-foot{
    padding:14px 16px 16px;
    border-top:1px solid rgba(255,255,255,0.08);
  }
  .file-state{
    font-size:11px;
    color:#7C8AA0;
    line-height:1.5;
    margin-bottom:10px;
  }
  .file-state strong{color:#C8D0DE; font-weight:600;}
  .dot{
    display:inline-block;
    width:6px; height:6px;
    border-radius:50%;
    margin-right:5px;
    position:relative; top:-1px;
  }
  .dot.live{background:var(--forest); box-shadow:0 0 0 3px rgba(60,122,92,0.25);}
  .dot.off{background:#5C6B7A;}

  .sb-btn{
    width:100%;
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.1);
    color:#D8DEE9;
    padding:8px 10px;
    border-radius:6px;
    font-size:12px;
    font-weight:500;
    margin-bottom:6px;
    text-align:left;
    transition:background 0.12s;
  }
  .sb-btn:hover{background:rgba(255,255,255,0.13);}
  .sb-btn.primary{background:var(--amber); border-color:var(--amber); color:var(--ink); font-weight:600;}
  .sb-btn.primary:hover{background:#C76C2E;}

  /* ===== Main ===== */
  main{
    margin-left:232px;
    flex:1;
    min-width:0;
    display:flex;
    flex-direction:column;
  }
  .topbar{
    background:var(--paper-raised);
    border-bottom:1px solid var(--line);
    padding:16px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky; top:0; z-index:20;
  }
  .page-title{font-size:19px; font-weight:700; letter-spacing:-0.01em;}
  .page-sub{font-size:12.5px; color:var(--slate); margin-top:2px;}
  .topbar-right{display:flex; gap:8px; align-items:center;}

  .content{padding:24px 28px 60px; flex:1;}

  /* ===== Buttons ===== */
  .btn{
    border:1px solid var(--line);
    background:var(--paper-raised);
    color:var(--ink);
    padding:8px 14px;
    border-radius:6px;
    font-size:13px;
    font-weight:600;
    display:inline-flex;
    align-items:center;
    gap:6px;
    transition:all 0.12s;
  }
  .btn:hover{border-color:var(--slate-soft); background:#FBFAF6;}
  .btn.amber{background:var(--amber); border-color:var(--amber); color:#fff;}
  .btn.amber:hover{background:#C76C2E;}
  .btn.ghost{background:transparent; border:1px solid transparent; color:var(--slate);}
  .btn.ghost:hover{background:var(--line-soft); color:var(--ink);}
  .btn.sm{padding:5px 10px; font-size:12px;}
  .btn:disabled{opacity:0.45; cursor:not-allowed;}
  .btn-ico{font-size:13px;}

  /* ===== Cards / panels ===== */
  .panel{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow-sm);
  }
  .panel-head{
    padding:14px 18px;
    border-bottom:1px solid var(--line-soft);
    display:flex; align-items:center; justify-content:space-between;
  }
  .panel-head h3{margin:0; font-size:14.5px; font-weight:700;}
  .panel-body{padding:18px;}

  /* ===== Stat strip ===== */
  .stats{display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:20px;}
  .stat{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 16px;
  }
  .stat-label{font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--slate); font-weight:600;}
  .stat-value{font-family:var(--font-mono); font-size:25px; font-weight:700; margin-top:5px; letter-spacing:-0.02em;}
  .stat.amber .stat-value{color:var(--amber);}
  .stat.brick .stat-value{color:var(--brick);}
  .stat.forest .stat-value{color:var(--forest);}
  .stat.slate .stat-value{color:var(--slate);}

  /* ===== Tables ===== */
  .table-wrap{overflow-x:auto; border-radius:var(--radius);}
  table{width:100%; border-collapse:collapse; font-size:14.5px;}
  thead th{
    text-align:left;
    padding:11px 14px;
    background:#EFEADA;
    color:var(--ink);
    font-weight:700;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    border-bottom:2px solid var(--line);
    white-space:nowrap;
    position:sticky; top:0;
  }
  tbody td{
    padding:11px 14px;
    border-bottom:1px solid var(--line-soft);
    white-space:nowrap;
    color:var(--ink);
    font-size:14.5px;
  }
  tbody tr:hover{background:#FBF9F2;}
  .mono{font-family:var(--font-mono); font-weight:600; color:var(--ink);}
  .num{font-family:var(--font-mono); text-align:right; font-weight:600; color:var(--ink);}
  td.num{text-align:right;}

  /* ===== Badges ===== */
  .badge{
    display:inline-flex; align-items:center; gap:4px;
    padding:3px 9px; border-radius:20px;
    font-size:11px; font-weight:700;
    letter-spacing:0.02em;
    font-family:var(--font-mono);
  }
  .badge.due{background:var(--amber-bg); color:#9A5320;}
  .badge.notdue{background:#EEF1F4; color:var(--slate);}
  .badge.done{background:var(--forest-bg); color:var(--forest);}
  .badge.pending{background:var(--brick-bg); color:var(--brick);}
  .badge.blank{background:transparent; color:var(--slate-soft);}

  /* ===== Forms ===== */
  .form-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:14px;}
  .field{display:flex; flex-direction:column; gap:5px;}
  .field.full{grid-column:1/-1;}
  .field label{font-size:12px; font-weight:600; color:var(--ink-soft);}
  .field .hint{font-size:11px; color:var(--slate-soft); margin-top:-2px;}
  .field input, .field select{
    border:1px solid var(--line);
    border-radius:6px;
    padding:9px 11px;
    font-size:13.5px;
    background:#fff;
    color:var(--ink);
    outline:none;
    transition:border-color 0.12s;
  }
  .field input:focus, .field select:focus{border-color:var(--ink-soft); box-shadow:0 0 0 3px rgba(21,35,59,0.06);}
  .field input.mono{font-family:var(--font-mono);}

  .form-actions{display:flex; gap:8px; margin-top:18px; padding-top:16px; border-top:1px solid var(--line-soft);}

  /* ===== Empty state ===== */
  .empty{
    text-align:center;
    padding:50px 30px;
    color:var(--slate);
  }
  .empty-ico{font-size:34px; margin-bottom:10px; opacity:0.7;}
  .empty h4{font-size:15px; color:var(--ink); margin:0 0 6px;}
  .empty p{font-size:13px; margin:0 0 16px; max-width:380px; margin-left:auto; margin-right:auto; line-height:1.5;}

  /* ===== Setup screen (no file connected) ===== */
  .setup-screen{
    min-height:100vh; width:100%;
    display:flex; align-items:center; justify-content:center;
    background:var(--paper);
    padding:30px;
  }
  .setup-card{
    max-width:480px;
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:var(--shadow-md);
    padding:38px 36px;
    text-align:center;
  }
  .setup-mark{
    font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em;
    color:var(--amber); font-weight:700; margin-bottom:10px;
  }
  .setup-card h1{font-size:23px; margin:0 0 10px; letter-spacing:-0.015em;}
  .setup-card p{font-size:13.5px; color:var(--slate); line-height:1.6; margin:0 0 26px;}
  .setup-options{display:flex; flex-direction:column; gap:10px;}
  .setup-opt{
    display:flex; align-items:center; gap:12px;
    padding:14px 16px;
    border:1px solid var(--line);
    border-radius:10px;
    background:#fff;
    text-align:left;
    transition:all 0.14s;
  }
  .setup-opt:hover{border-color:var(--amber); background:var(--amber-bg);}
  .setup-opt-ico{font-size:20px; flex-shrink:0;}
  .setup-opt-text strong{display:block; font-size:13.5px; font-weight:700;}
  .setup-opt-text span{display:block; font-size:11.5px; color:var(--slate); margin-top:1px;}
  .setup-note{font-size:11.5px; color:var(--slate-soft); margin-top:22px; line-height:1.5;}
  .browser-warn{
    background:var(--brick-bg); color:var(--brick);
    border-radius:8px; padding:10px 14px; font-size:12px;
    margin-bottom:18px; text-align:left; line-height:1.5;
  }

  /* ===== Toast ===== */
  #toast-wrap{position:fixed; bottom:20px; right:20px; z-index:200; display:flex; flex-direction:column; gap:8px; align-items:flex-end;}
  .toast{
    background:var(--ink); color:#fff;
    padding:11px 16px; border-radius:8px;
    font-size:12.5px; font-weight:500;
    box-shadow:0 6px 20px rgba(0,0,0,0.25);
    display:flex; align-items:center; gap:8px;
    animation:slideIn 0.22s ease-out;
    max-width:340px;
  }
  .toast.err{background:var(--brick);}
  .toast.ok{background:var(--forest);}
  @keyframes slideIn{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

  /* ===== Modal ===== */
  .modal-bg{
    position:fixed; inset:0; background:rgba(21,35,59,0.45);
    display:flex; align-items:center; justify-content:center;
    z-index:150; padding:20px;
  }
  .modal{
    background:#fff; border-radius:12px; max-width:560px; width:100%;
    box-shadow:var(--shadow-md); max-height:85vh; display:flex; flex-direction:column;
  }
  .modal-head{padding:18px 22px; border-bottom:1px solid var(--line-soft); display:flex; justify-content:space-between; align-items:center;}
  .modal-head h3{margin:0; font-size:16px; font-weight:700;}
  .modal-body{padding:20px 22px; overflow-y:auto;}
  .modal-foot{padding:14px 22px; border-top:1px solid var(--line-soft); display:flex; justify-content:flex-end; gap:8px;}
  .close-x{background:none; border:none; font-size:18px; color:var(--slate); padding:2px 6px;}

  /* ===== Tabs ===== */
  .tabs{display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:18px;}
  .tab{
    padding:9px 14px; font-size:13px; font-weight:600; color:var(--slate);
    border-bottom:2px solid transparent; cursor:pointer;
  }
  .tab.active{color:var(--ink); border-bottom-color:var(--amber);}

  /* ===== Search/filter bar ===== */
  .filter-bar{display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center;}
  .filter-bar input, .filter-bar select{
    border:1px solid var(--line); border-radius:6px; padding:7px 11px; font-size:13px; background:#fff;
  }
  .filter-bar input[type=text]{min-width:220px;}

  .pill{
    display:inline-flex; align-items:center; gap:5px;
    background:var(--gold-bg); color:#8A6D14;
    padding:4px 10px; border-radius:20px; font-size:11.5px; font-weight:700;
  }

  /* odometer-style countdown chip used in Summary */
  .odo-chip{
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--font-mono); font-weight:700; font-size:12px;
    padding:4px 8px; border-radius:5px; background:#0E1A2C; color:#F2C879;
    letter-spacing:0.04em;
  }
  .odo-chip.warn{background:#3A1410; color:#FF9B8C;}
  .odo-chip.ok{background:#0E1A2C; color:#8FE3B5;}

  .section-label{font-size:11px; text-transform:uppercase; letter-spacing:0.07em; color:var(--slate); font-weight:700; margin:22px 0 10px;}
  .section-label:first-child{margin-top:0;}

  .helptext{font-size:12px; color:var(--slate); line-height:1.6;}
  code.k{background:var(--line-soft); padding:1px 6px; border-radius:4px; font-family:var(--font-mono); font-size:11.5px;}

  .vehicle-link{color:var(--ink); font-weight:700; text-decoration:none; border-bottom:1px dashed var(--slate-soft); cursor:pointer;}
  .vehicle-link:hover{color:var(--amber);}

  ::-webkit-scrollbar{width:9px; height:9px;}
  ::-webkit-scrollbar-thumb{background:#D8D1BD; border-radius:5px;}
  ::-webkit-scrollbar-track{background:transparent;}

  @media (max-width: 900px){
    #sidebar{width:100%; height:auto; position:relative;}
    main{margin-left:0;}
    .stats{grid-template-columns:repeat(2,1fr);}
    .form-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div id="root"></div>
<div id="toast-wrap"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
/* =========================================================================
   PMS TRACKER — Periodic Maintenance Service
   Single-file app. Data model + calculation engine + UI render functions.
   Storage: File System Access API (Chrome/Edge) writing a JSON file,
            with localStorage as an automatic fallback / mirror, and
            an Excel export/import path via SheetJS.
   ========================================================================= */

const STATE = {
  fileHandle: null,        // FileSystemFileHandle for the live JSON file
  fsApiSupported: ('showSaveFilePicker' in window),
  connected: false,        // true once a working file is picked/created
  page: 'vehicles',
  data: {
    vehicles: [],            // {id, sno, vehicleNumber, partnerName, mapcode, makeModel, saleDate,
                              //  km1, kmInc2, kmInc3, kmFlat,   <- Service1 threshold, +Inc to reach Svc2, +Inc to reach Svc3, then flat from Svc4+
                              //  day1, dayInc2, dayInc3, dayFlat}
                              // NOTE: gpsOdo is NOT stored on the vehicle anymore — it's derived from odoSnapshots,
                              // since ODO is uploaded weekly (every Friday) and history must be kept per snapshot date.
    services: [],             // {id, vehicleId, serviceNumber, doneDate, doneKm, snapshotDate, enteredAt}
    odoSnapshots: []          // {id, vehicleId, snapshotDate (YYYY-MM-DD), odo, enteredAt}
  },
  ui:{
    vehicleEditing:null,
    vehicleDetailId:null,
    feederSnapshotDate:'',     // the Friday date being uploaded against, chosen before bulk upload
    summaryFilter:'',
    summaryMapcodeFilter:'',
    summaryPartnerFilter:'',
    summaryDueOnly:false,
    summaryAsOfDate:'',        // '' = latest; else show pending-as-of this snapshot date (with resolution shown if since completed)
    consolidatedFilter:'',
    consolidatedMapcodeFilter:'',
    consolidatedPartnerFilter:'',
    chartsMapcodeFilter:'',
    chartsPartnerFilter:'',
    chartsDateFrom:'',
    chartsDateTo:'',
    chartsGroupBy:'partner',
    adhPartner:'',             // selected partner for the Adh%/MonthWise report
    adhMapcode:'',             // selected mapcode for the bucket drill-down
    adhMode:'month',           // 'month' or 'year' — kept as visibly separate modes per confirmation
    adhYear: new Date().getFullYear(),
    adhMonth: new Date().getMonth()+1,
    importMode:null
  },
  // High Risk bucket selection — defaults match the original Excel exactly,
  // user can tick/untick via the settings panel since "manager changes this
  // all the time based on partner" per confirmed requirement.
  highRiskSettings:{
    doneAgainstDueOverall: ['4. 2001 to 3000 KM','5. 3001 to 10000 KM'],
    doneAgainstDuePostDue: ['4. 2001 to 3000 KM','5. 3001 to 10000 KM','6. 10000++'],
    doneAgainstDueBeforeDue: ['-3. -1001 to -2000 KM','-4. -2001 to -3000 KM','-5. -3000++'],
    doneAgainstNotDue: ['-3. -1001 to -2000 KM','-4. -2001 to -3000 KM','-5. -3000++']
  }
};

/* Resolve a vehicle's ODO as of a given date (or latest if no date given).
   "As of" = the most recent snapshot whose date is <= asOfDate. This is what
   lets the Summary page answer "how many vehicles were pending as of last Friday". */
function getOdoAsOf(vehicleId, asOfDate){
  const snaps = STATE.data.odoSnapshots
    .filter(s=>s.vehicleId===vehicleId && (!asOfDate || s.snapshotDate<=asOfDate))
    .sort((a,b)=> a.snapshotDate.localeCompare(b.snapshotDate));
  if(snaps.length===0) return 0;
  return numOrZero(snaps[snaps.length-1].odo);
}
function getLatestOdo(vehicleId){
  return getOdoAsOf(vehicleId, '');
}
function getAllSnapshotDates(){
  const dates = new Set(STATE.data.odoSnapshots.map(s=>s.snapshotDate));
  return Array.from(dates).sort().reverse();
}

/* ---------------------------- Utilities -------------------------------- */

function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

/* Guarantees STATE.data always has the full expected shape (vehicles/services/
   odoSnapshots arrays), even when loading a file or localStorage blob saved by
   an earlier version of this app that didn't have all these fields yet. Every
   single place that assigns STATE.data from an external source MUST pass
   through this first — loading an incomplete shape raw is what causes
   "Cannot read properties of undefined" crashes right after connecting. */
function normalizeLoadedData(raw){
  const safe = raw && typeof raw==='object' ? raw : {};
  return {
    vehicles: Array.isArray(safe.vehicles) ? safe.vehicles : [],
    services: Array.isArray(safe.services) ? safe.services : [],
    odoSnapshots: Array.isArray(safe.odoSnapshots) ? safe.odoSnapshots : []
  };
}

const DEFAULT_HIGH_RISK_SETTINGS = {
  // Done against Due has THREE separate High Risk views in the original sheet —
  // confirmed: keep all three as distinct categories, not collapsed into one.
  doneAgainstDueOverall:   ['4. 2001 to 3000 KM','5. 3001 to 10000 KM'],
  doneAgainstDuePostDue:   ['4. 2001 to 3000 KM','5. 3001 to 10000 KM','6. 10000++'],
  doneAgainstDueBeforeDue: ['-3. -1001 to -2000 KM','-4. -2001 to -3000 KM','-5. -3000++'],
  // Done against Not Due only ever has one High Risk definition in the original sheet.
  doneAgainstNotDue: ['-3. -1001 to -2000 KM','-4. -2001 to -3000 KM','-5. -3000++']
};
// The 11-bucket scheme is IDENTICAL for both Done-against-Due and Done-against-Not-Due
// tables in the original sheet (confirmed directly from the workbook) — same labels, same order.
const DONE_BUCKET_LABELS = [
  '-1. 0 to -500 KM','-2. -501 to -1000 KM','-3. -1001 to -2000 KM','-4. -2001 to -3000 KM','-5. -3000++',
  '1. 0 to 500 KM','2. 501 to 1000 KM','3. 1001 to 2000 KM','4. 2001 to 3000 KM','5. 3001 to 10000 KM','6. 10000++'
];
function bucketForDone(devKm){
  if(devKm===null || devKm===undefined || isNaN(devKm)) return '';
  if(devKm<0){
    const a = Math.abs(devKm);
    if(a<=500) return '-1. 0 to -500 KM';
    if(a<=1000) return '-2. -501 to -1000 KM';
    if(a<=2000) return '-3. -1001 to -2000 KM';
    if(a<=3000) return '-4. -2001 to -3000 KM';
    return '-5. -3000++';
  }
  if(devKm<=500) return '1. 0 to 500 KM';
  if(devKm<=1000) return '2. 501 to 1000 KM';
  if(devKm<=2000) return '3. 1001 to 2000 KM';
  if(devKm<=3000) return '4. 2001 to 3000 KM';
  if(devKm<=10000) return '5. 3001 to 10000 KM';
  return '6. 10000++';
}

/* Pending KM bucket — confirmed from Consolidated columns Z/AA: a coarser,
   4-range scheme distinct from the 11-bucket Done scheme above, used only
   for vehicles that are "Pending Against Due" (never-completed services). */
const PENDING_BUCKET_LABELS = ['1. 0 to 2000 KM','2. 2001 to 5000 KM','3. 5001 to 10000 KM','4. 10000++'];
function bucketForPending(pendingKm){
  if(pendingKm===null || pendingKm===undefined || isNaN(pendingKm)) return '';
  if(pendingKm<=2000) return '1. 0 to 2000 KM';
  if(pendingKm<=5000) return '2. 2001 to 5000 KM';
  if(pendingKm<=10000) return '3. 5001 to 10000 KM';
  return '4. 10000++';
}
function normalizeHighRiskSettings(raw){
  const d = DEFAULT_HIGH_RISK_SETTINGS;
  if(!raw || typeof raw!=='object') return JSON.parse(JSON.stringify(d));
  return {
    doneAgainstDueOverall: Array.isArray(raw.doneAgainstDueOverall) ? raw.doneAgainstDueOverall : d.doneAgainstDueOverall,
    doneAgainstDuePostDue: Array.isArray(raw.doneAgainstDuePostDue) ? raw.doneAgainstDuePostDue : d.doneAgainstDuePostDue,
    doneAgainstDueBeforeDue: Array.isArray(raw.doneAgainstDueBeforeDue) ? raw.doneAgainstDueBeforeDue : d.doneAgainstDueBeforeDue,
    doneAgainstNotDue: Array.isArray(raw.doneAgainstNotDue) ? raw.doneAgainstNotDue : d.doneAgainstNotDue
  };
}

function toast(msg, type=''){
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' '+type : '');
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .25s'; el.style.opacity='0'; setTimeout(()=>el.remove(),250); }, 3200);
}

function fmtDate(d){
  if(!d) return '';
  const dt = (d instanceof Date) ? d : new Date(d);
  if(isNaN(dt.getTime())) return '';
  const dd = String(dt.getDate()).padStart(2,'0');
  const mm = String(dt.getMonth()+1).padStart(2,'0');
  const yy = dt.getFullYear();
  return `${dd}-${mm}-${yy}`;
}
function toISO(d){
  if(!d) return '';
  const dt = (d instanceof Date) ? d : new Date(d);
  if(isNaN(dt.getTime())) return '';
  return dt.toISOString().slice(0,10);
}
function addDays(date, days){
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}
function daysBetween(a,b){
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}
function escapeHtml(s){
  if(s===null||s===undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function numOrZero(v){ const n = parseFloat(v); return isNaN(n) ? 0 : n; }

/* ===========================================================================
   CALCULATION ENGINE
   Per-vehicle 3-stage + flat schedule (confirmed, both Km and Days):
   - Service 1: Due = vehicle.km1 / vehicle.day1                  (model-specific threshold)
   - Service 2: Due = (ACTUAL Service1 Done Km/Date) + kmInc2/dayInc2
   - Service 3: Due = (ACTUAL Service2 Done Km/Date) + kmInc3/dayInc3
   - Service 4+: Due = (ACTUAL previous Done Km/Date) + kmFlat/dayFlat, repeating
     (chains off the DUE value instead, only when nothing has actually been done yet)
   - OEM.Logic mirrors the same per-vehicle thresholds/increments, but always
     computed fresh from Sale Date (ignores actual done history) — the
     "textbook" parallel track.
   - Status: 'Done' if doneDate filled else 'Pending'
   - Due Status: 'Due' if currentOdo >= dueKm else 'Not Due'  (computed per due-track)
   - Dev. Days = doneDate - dueDate(Prev.Serv)   [blank if negative]
   - Dev. Kms  = doneKm  - dueKM(Prev.Serv)
   - Due Vs Done: combination of Due Status(Prev.Serv) + Status
        -> 'Done Against Due' / 'Done Against Not Due' / 'Pending Against Due' / '' 
   - Pending: flags specifically 'Pending Against Due'
   - Pending KM's / Pending Bucket: Current ODO - Due KM(Prev.Serv), bucketed,
     only for Pending Against Due rows (confirmed from Consolidated cols Z/AA).
   - Lapsed: a service has no Done data, but a LATER service number for the
     same vehicle already does — i.e. it was skipped/jumped over.
   - Bucket List Due vs Done / Not Due vs Done: classify Dev.Kms using the SAME
     11-bucket scheme as the PMS Adh% sheet (confirmed directly from the
     workbook — Consolidated and Adh% use identical bucket labels, not two
     different schemes), only populated for the matching Due Vs Done category.
   =========================================================================== */

const MAX_SERVICES = 40;

function getVehicleServices(vehicleId){
  const map = {};
  STATE.data.services.filter(s=>s.vehicleId===vehicleId).forEach(s=>{ map[s.serviceNumber] = s; });
  return map;
}

/**
 * Computes the full 40-service block for a single vehicle, mirroring the
 * Summary (Consolidated) sheet exactly, but using the vehicle's OWN
 * Service Interval (Kms)/(Days) from service 3 onward — per confirmed scope.
 *
 * @param {object} vehicle
 * @param {string} [asOfDate] - YYYY-MM-DD. If given, ODO is resolved from the
 *   most recent snapshot on/before this date, and any service whose doneDate
 *   is AFTER this date is treated as not-yet-done — this is what makes the
 *   "pending as of [Friday]" historical view in Summary actually correct,
 *   rather than just swapping the ODO number while still counting future work.
 */
/**
 * Computes the full 40-service block for a single vehicle.
 *
 * Schedule structure (confirmed): each vehicle defines its own 3-stage + flat
 * schedule, separately for Km and Days:
 *   Service 1 due  = km1 / day1                          (model-specific threshold)
 *   Service 2 due  = (ACTUAL Service1 Done Km/Date) + kmInc2 / dayInc2
 *   Service 3 due  = (ACTUAL Service2 Done Km/Date) + kmInc3 / dayInc3
 *   Service 4+ due = (ACTUAL previous Done Km/Date) + kmFlat / dayFlat, repeating
 * Confirmed directly from examples: chaining uses whatever was ACTUALLY done,
 * not the due value — e.g. Service1 done at 999km → Service2 due at 999+inc2,
 * even though Service1 was due at 1000km. If a service hasn't been done yet,
 * the chain continues from the DUE value instead (nothing else to chain from).
 *
 * @param {object} vehicle
 * @param {string} [asOfDate] - YYYY-MM-DD. If given, ODO is resolved from the
 *   most recent snapshot on/before this date, and any service whose doneDate
 *   is AFTER this date is treated as not-yet-done for STATUS purposes — but
 *   per confirmed requirement, the row still appears in historical Pending
 *   views with its real (future) Done Date/Km shown for context/resolution.
 */
function computeVehicleBlocks(vehicle, asOfDate){
  const svcMap = getVehicleServices(vehicle.id);
  const blocks = [];
  const saleDate = vehicle.saleDate ? new Date(vehicle.saleDate) : null;
  const curOdo = getOdoAsOf(vehicle.id, asOfDate);

  // Per-vehicle 3-stage + flat schedule, with safe fallbacks if a vehicle is
  // missing these fields (e.g. loaded from an older save) so nothing crashes.
  const km1 = numOrZero(vehicle.km1) || 1000;
  const kmInc2 = numOrZero(vehicle.kmInc2) || 4000;
  const kmInc3 = numOrZero(vehicle.kmInc3) || 5000;
  const kmFlat = numOrZero(vehicle.kmFlat) || 10000;
  const day1 = numOrZero(vehicle.day1) || 30;
  const dayInc2 = numOrZero(vehicle.dayInc2) || 150;
  const dayInc3 = numOrZero(vehicle.dayInc3) || 185;
  const dayFlat = numOrZero(vehicle.dayFlat) || 365;

  let prevDuePrevDate=null, prevDuePrevKm=null, prevDoneDateRaw=null, prevDoneKmRaw=null;
  let prevDueOemDate=null, prevDueOemKm=null;

  for(let n=1; n<=MAX_SERVICES; n++){
    const svc = svcMap[n];
    // When viewing a historical snapshot, a service logged with a doneDate
    // AFTER that snapshot date hasn't "happened yet" from that vantage point
    // for STATUS purposes — but we keep the raw values too, so a historical
    // Pending view can still show "resolved since, on X date at Y km".
    const realDoneDate = svc && svc.doneDate ? svc.doneDate : null;
    const realDoneKm = svc && svc.doneKm!==undefined && svc.doneKm!=='' ? numOrZero(svc.doneKm) : null;
    const svcVisible = svc && (!asOfDate || !svc.doneDate || svc.doneDate<=asOfDate);
    const doneDate = svcVisible ? realDoneDate : null;
    const doneKm = svcVisible ? realDoneKm : null;

    // ---- Due Date / KM (Prev.Serv chain) — chains off ACTUAL done values ----
    let duePrevDate, duePrevKm;
    if(n===1){
      duePrevDate = saleDate ? addDays(saleDate, day1) : null;
      duePrevKm = km1;
    } else if(n===2){
      const baseKm = (prevDoneKmRaw!==null && prevDoneKmRaw!==undefined) ? prevDoneKmRaw : prevDuePrevKm;
      const baseDate = prevDoneDateRaw || prevDuePrevDate;
      duePrevKm = (baseKm!==null) ? baseKm + kmInc2 : null;
      duePrevDate = baseDate ? addDays(baseDate, dayInc2) : null;
    } else if(n===3){
      const baseKm = (prevDoneKmRaw!==null && prevDoneKmRaw!==undefined) ? prevDoneKmRaw : prevDuePrevKm;
      const baseDate = prevDoneDateRaw || prevDuePrevDate;
      duePrevKm = (baseKm!==null) ? baseKm + kmInc3 : null;
      duePrevDate = baseDate ? addDays(baseDate, dayInc3) : null;
    } else {
      const baseKm = (prevDoneKmRaw!==null && prevDoneKmRaw!==undefined) ? prevDoneKmRaw : prevDuePrevKm;
      const baseDate = prevDoneDateRaw || prevDuePrevDate;
      duePrevKm = (baseKm!==null) ? baseKm + kmFlat : null;
      duePrevDate = baseDate ? addDays(baseDate, dayFlat) : null;
    }

    // ---- Due Date / KM (OEM.Logic — fixed textbook schedule, ignores actual history) ----
    let dueOemDate, dueOemKm;
    if(n===1){ dueOemDate = saleDate ? addDays(saleDate, day1) : null; dueOemKm = km1; }
    else if(n===2){ dueOemDate = prevDueOemDate ? addDays(prevDueOemDate, dayInc2) : null; dueOemKm = (prevDueOemKm!==null) ? prevDueOemKm + kmInc2 : null; }
    else if(n===3){ dueOemDate = prevDueOemDate ? addDays(prevDueOemDate, dayInc3) : null; dueOemKm = (prevDueOemKm!==null) ? prevDueOemKm + kmInc3 : null; }
    else { dueOemDate = prevDueOemDate ? addDays(prevDueOemDate, dayFlat) : null; dueOemKm = (prevDueOemKm!==null) ? prevDueOemKm + kmFlat : null; }

    const dueStatusPrev = (duePrevKm!==null && curOdo >= duePrevKm) ? 'Due' : 'Not Due';
    const dueStatusOem = (dueOemKm!==null && curOdo >= dueOemKm) ? 'Due' : 'Not Due';
    const status = doneDate ? 'Done' : 'Pending';

    let devDays = null, devKm = null;
    if(doneDate && duePrevDate){
      devDays = daysBetween(duePrevDate, doneDate);
    }
    if(doneKm!==null && duePrevKm!==null){
      devKm = doneKm - duePrevKm;
    }

    // Due Vs Done category
    let dueVsDone = '';
    if(doneDate){
      dueVsDone = (dueStatusPrev==='Due') ? 'Done Against Due' : 'Done Against Not Due';
    } else if(dueStatusPrev==='Due'){
      dueVsDone = 'Pending Against Due';
    } else {
      dueVsDone = '';
    }
    const pendingFlag = dueVsDone==='Pending Against Due' ? 'Pending Against Due' : '';

    // Pending KM's + Pending Bucket — confirmed from Consolidated columns Z/AA:
    // Current ODO - Due KM (Prev.Serv), only for Pending Against Due rows.
    let pendingKm = null, pendingBucket = '';
    if(dueVsDone==='Pending Against Due' && duePrevKm!==null){
      pendingKm = curOdo - duePrevKm;
      pendingBucket = bucketForPending(pendingKm);
    }

    const bucketDue = (dueVsDone==='Done Against Due') ? bucketForDone(devKm) : '';
    const bucketNotDue = (dueVsDone==='Done Against Not Due') ? bucketForDone(devKm) : '';

    // Lapsed: a Done-against-Due service whose deviation lands in the most
    // extreme bucket (6. 10000++) — confirmed: reads directly from the same
    // bucketDue value shown on screen, so the Lapsed flag and the bucket
    // table always tell the same story. Applies identically to all 40
    // services (no special-casing for Services 1/2/3).
    const isLapsed = bucketDue === '6. 10000++';

    blocks.push({
      serviceNumber:n,
      duePrevDate, duePrevKm, dueStatusPrev,
      dueOemDate, dueOemKm, dueStatusOem,
      doneDate, doneKm,
      realDoneDate, realDoneKm, // raw values regardless of asOfDate visibility — used for historical "resolved since" display
      status, devDays, devKm,
      dueVsDone, pendingFlag, bucketDue, bucketNotDue,
      pendingKm, pendingBucket,
      isLapsed
    });

    prevDuePrevDate = duePrevDate; prevDuePrevKm = duePrevKm;
    prevDoneDateRaw = doneDate ? new Date(doneDate) : null;
    prevDoneKmRaw = doneKm;
    prevDueOemDate = dueOemDate; prevDueOemKm = dueOemKm;
  }
  return blocks;
}

/* Consolidated = flatten every vehicle's blocks where dueVsDone is non-blank,
   mirroring Macro 3 (Build_Consolidated_Service_Report) exactly. */
function buildConsolidated(asOfDate){
  const rows = [];
  STATE.data.vehicles.forEach(v=>{
    const blocks = computeVehicleBlocks(v, asOfDate);
    blocks.forEach(b=>{
      if(b.dueVsDone){
        rows.push({ vehicle:v, ...b });
      }
    });
  });
  return rows;
}

/* ============================ Storage layer ============================= */

function persistKey(){ return 'pms_tracker_data_v1'; }

/* --- IndexedDB handle store: lets us remember the FileSystemFileHandle
   across browser restarts (handles can't go in localStorage/JSON), so
   returning users can reconnect to their last file in one click instead
   of picking it from scratch every time. --- */
const HANDLE_DB = 'pms_tracker_handles';
const HANDLE_STORE = 'handles';
function openHandleDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(HANDLE_DB, 1);
    req.onupgradeneeded = ()=>{ req.result.createObjectStore(HANDLE_STORE); };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
}
async function saveHandleRef(handle){
  try{
    const db = await openHandleDB();
    await new Promise((res,rej)=>{
      const tx = db.transaction(HANDLE_STORE,'readwrite');
      tx.objectStore(HANDLE_STORE).put(handle, 'lastFile');
      tx.oncomplete = res; tx.onerror = ()=>rej(tx.error);
    });
  }catch(e){ console.warn('Could not remember file handle', e); }
}
async function loadHandleRef(){
  try{
    const db = await openHandleDB();
    return await new Promise((res,rej)=>{
      const tx = db.transaction(HANDLE_STORE,'readonly');
      const req = tx.objectStore(HANDLE_STORE).get('lastFile');
      req.onsuccess = ()=>res(req.result || null);
      req.onerror = ()=>rej(req.error);
    });
  }catch(e){ return null; }
}
async function clearHandleRef(){
  try{
    const db = await openHandleDB();
    const tx = db.transaction(HANDLE_STORE,'readwrite');
    tx.objectStore(HANDLE_STORE).delete('lastFile');
  }catch(e){}
}

async function writeToFile(){
  const payload = JSON.stringify({version:2, savedAt:new Date().toISOString(), data:STATE.data, highRiskSettings:STATE.highRiskSettings});
  // mirror to localStorage always (fast fallback, works even pre-connect)
  try{ localStorage.setItem(persistKey(), payload); }catch(e){}
  if(STATE.fileHandle){
    try{
      const writable = await STATE.fileHandle.createWritable();
      await writable.write(payload);
      await writable.close();
    }catch(e){
      console.error('File write failed', e);
      toast('Could not write to file — check the file is still accessible.', 'err');
    }
  }
}

function loadFromLocalStorage(){
  try{
    const raw = localStorage.getItem(persistKey());
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && parsed.data){
        STATE.data = normalizeLoadedData(parsed.data);
        STATE.highRiskSettings = normalizeHighRiskSettings(parsed.highRiskSettings);
        return true;
      }
    }
  }catch(e){}
  return false;
}

async function connectNewFile(){
  if(!STATE.fsApiSupported){ toast('Your browser does not support saving to a real file. Use Chrome or Edge.', 'err'); return; }
  try{
    const handle = await window.showSaveFilePicker({
      suggestedName:'pms-tracker-data.json',
      types:[{description:'PMS Tracker Data', accept:{'application/json':['.json']}}]
    });
    STATE.fileHandle = handle;
    STATE.connected = true;
    await saveHandleRef(handle);
    await writeToFile();
    toast('New data file created. Everything you do now saves here automatically.', 'ok');
    render();
  }catch(e){
    if(e.name!=='AbortError') toast('Could not create file.', 'err');
  }
}

async function openExistingFile(){
  if(!STATE.fsApiSupported){ toast('Your browser does not support opening a real file. Use Chrome or Edge.', 'err'); return; }
  try{
    const [handle] = await window.showOpenFilePicker({
      types:[{description:'PMS Tracker Data', accept:{'application/json':['.json']}}]
    });
    const file = await handle.getFile();
    const text = await file.text();
    const parsed = JSON.parse(text);
    if(!parsed || !parsed.data) throw new Error('Invalid file format');
    STATE.data = normalizeLoadedData(parsed.data);
    STATE.highRiskSettings = normalizeHighRiskSettings(parsed.highRiskSettings);
    STATE.fileHandle = handle;
    STATE.connected = true;
    await saveHandleRef(handle);
    toast('File loaded. ' + STATE.data.vehicles.length + ' vehicle(s) found.', 'ok');
    render();
  }catch(e){
    if(e.name!=='AbortError') toast('Could not open file — make sure it is a valid PMS Tracker data file.', 'err');
  }
}

/* Attempts to silently reconnect to the last file the user used, by
   reading the remembered handle from IndexedDB and re-requesting
   permission on it (Chrome/Edge ask a one-click "Allow" the first
   time per session; after that it's silent). Returns true on success. */
async function tryReconnectLastFile(){
  if(!STATE.fsApiSupported) return false;
  const handle = await loadHandleRef();
  if(!handle) return false;
  try{
    const perm = await handle.queryPermission({mode:'readwrite'});
    if(perm !== 'granted'){
      const req = await handle.requestPermission({mode:'readwrite'});
      if(req !== 'granted') return false;
    }
    const file = await handle.getFile();
    const text = await file.text();
    const parsed = JSON.parse(text);
    if(!parsed || !parsed.data) return false;
    STATE.data = normalizeLoadedData(parsed.data);
    STATE.highRiskSettings = normalizeHighRiskSettings(parsed.highRiskSettings);
    STATE.fileHandle = handle;
    STATE.connected = true;
    return true;
  }catch(e){
    return false;
  }
}

function continueWithoutFile(){
  loadFromLocalStorage();
  STATE.connected = true;
  STATE.fileHandle = null;
  toast('Working in browser storage only. Use "Connect a File" anytime from the sidebar to switch.', '');
  render();
}

async function disconnectFile(){
  STATE.fileHandle = null;
  await clearHandleRef();
  toast('Disconnected from file. Now saving to browser storage only.', '');
  render();
}

function normalizeHeader(h){
  return String(h||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim().replace(/\s+/g,' ');
}

const VEHICLE_FIELD_ALIASES = {
  vehicleNumber: ['vehicle number','vehicle no','vehicle num','reg number','registration number'],
  partnerName: ['partner name','partner'],
  mapcode: ['mapcode','map code'],
  makeModel: ['make model','make and model','vehicle model','model'],
  saleDate: ['sale date','date of sale','purchase date'],
  km1: ['service 1 due kms','service 1 due km','service1 due kms','1st service kms','service 1 kms'],
  kmInc2: ['service 2 increment kms','service 2 increment km','service2 increment kms','2nd service increment kms'],
  kmInc3: ['service 3 increment kms','service 3 increment km','service3 increment kms','3rd service increment kms'],
  kmFlat: ['service 4 flat interval kms','service 4 flat interval km','flat interval kms','service interval kms','interval kms'],
  day1: ['service 1 due days','service1 due days','1st service days','service 1 days'],
  dayInc2: ['service 2 increment days','service2 increment days','2nd service increment days'],
  dayInc3: ['service 3 increment days','service3 increment days','3rd service increment days'],
  dayFlat: ['service 4 flat interval days','flat interval days','service interval days','interval days']
};

function buildHeaderMapGeneric(rawHeaders, aliasMap){
  const normalizedToRaw = {};
  rawHeaders.forEach(h=>{ normalizedToRaw[normalizeHeader(h)] = h; });
  const fieldMap = {};
  Object.entries(aliasMap).forEach(([field, aliases])=>{
    for(const alias of aliases){
      if(normalizedToRaw[alias]){ fieldMap[field] = normalizedToRaw[alias]; break; }
    }
  });
  return fieldMap;
}
function buildHeaderMap(rawHeaders){
  return buildHeaderMapGeneric(rawHeaders, VEHICLE_FIELD_ALIASES);
}

function handleVehicleExcelUpload(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if(rows.length===0){ toast('That file has no data rows below the header.', 'err'); return; }

      const headerMap = buildHeaderMap(Object.keys(rows[0]));
      if(!headerMap.vehicleNumber){
        toast('Could not find a "Vehicle Number" column in that file. Download the template to see the expected format.', 'err');
        return;
      }

      let added=0, skipped=0, skippedReasons=[];
      rows.forEach(r=>{
        const vehicleNumber = String(r[headerMap.vehicleNumber]||'').trim();
        if(!vehicleNumber){ skipped++; return; }
        const exists = STATE.data.vehicles.find(v=>v.vehicleNumber.toLowerCase()===vehicleNumber.toLowerCase());
        if(exists){ skipped++; skippedReasons.push(vehicleNumber+' (duplicate)'); return; }
        STATE.data.vehicles.push({
          id:uid(),
          sno: STATE.data.vehicles.length+1,
          vehicleNumber,
          partnerName: headerMap.partnerName ? String(r[headerMap.partnerName]||'').trim() : '',
          mapcode: headerMap.mapcode ? String(r[headerMap.mapcode]||'').trim() : '',
          makeModel: headerMap.makeModel ? String(r[headerMap.makeModel]||'').trim() : '',
          saleDate: headerMap.saleDate && r[headerMap.saleDate] ? toISO(r[headerMap.saleDate]) : '',
          km1: (headerMap.km1 ? numOrZero(r[headerMap.km1]) : 0) || 1000,
          kmInc2: (headerMap.kmInc2 ? numOrZero(r[headerMap.kmInc2]) : 0) || 4000,

          kmFlat: (headerMap.kmFlat ? numOrZero(r[headerMap.kmFlat]) : 0) || 10000,
          day1: (headerMap.day1 ? numOrZero(r[headerMap.day1]) : 0) || 30,

          dayFlat: (headerMap.dayFlat ? numOrZero(r[headerMap.dayFlat]) : 0) || 365
        });
        added++;
      });
      writeToFile();
      const requiredCols = ['vehicleNumber','partnerName','mapcode','makeModel','saleDate'];
      const missingCols = requiredCols.filter(f=>!headerMap[f]);
      const scheduleColsMissing = ['km1','kmInc2','kmInc3','kmFlat','day1','dayInc2','dayInc3','dayFlat'].filter(f=>!headerMap[f]);
      let msg = `Imported ${added} vehicle(s)${skipped?`, skipped ${skipped} (blank or duplicate)`:''}.`;
      if(missingCols.length) msg += ` Note: couldn't find columns for ${missingCols.join(', ')} — those were left blank.`;
      if(scheduleColsMissing.length===8) msg += ` No service-schedule columns found — defaults were used (1000/4000/5000/10000 km, 30/150/185/365 days). Edit vehicles individually to set their real schedule.`;
      toast(msg, added?'ok':'err');
      render();
    }catch(err){
      console.error(err);
      toast('Could not read that Excel file. Make sure it matches the template format.', 'err');
    }
  };
  reader.readAsArrayBuffer(file);
}

/* ================================ Feeder logic ============================ */

/**
 * Validates and records one Feeder row. Used by both the manual single-entry
 * form and the bulk Excel upload (so every row gets identical checks:
 * Vehicle Not Found / Invalid Service No / Repeat Entry).
 *
 * @param {object} form - {vehicleNumber, gpsOdo, doneDate, doneKm, serviceNumber}
 * @param {string} snapshotDate - YYYY-MM-DD, the Friday this batch belongs to
 * @returns {{ok:boolean, message:string}}
 */
function validateAndRecordFeederRow(form, snapshotDate){
  const vehicleNumber = String(form.vehicleNumber||'').trim();
  if(!vehicleNumber) return {ok:false, message:'Vehicle Number is required.'};

  const vehicle = STATE.data.vehicles.find(v=>v.vehicleNumber.toLowerCase()===vehicleNumber.toLowerCase());
  if(!vehicle){
    return {ok:false, message:`Vehicle Not Found: "${vehicleNumber}" is not in Vehicle Master.`};
  }

  const serviceNumber = parseInt(form.serviceNumber,10);
  if(!serviceNumber || serviceNumber<1 || serviceNumber>MAX_SERVICES){
    return {ok:false, message:`Invalid Service No for ${vehicleNumber}. Must be between 1 and ${MAX_SERVICES}.`};
  }

  const existing = STATE.data.services.find(s=>s.vehicleId===vehicle.id && s.serviceNumber===serviceNumber);
  if(existing){
    return {ok:false, message:`Repeat Entry: Service #${serviceNumber} for ${vehicleNumber} is already recorded (done ${fmtDate(existing.doneDate)}).`};
  }

  if(!form.doneDate) return {ok:false, message:`Service Done Date is required for ${vehicleNumber}.`};
  if(form.doneKm===''||form.doneKm===null||form.doneKm===undefined || isNaN(parseFloat(form.doneKm))){
    return {ok:false, message:`Service Done Kms is required for ${vehicleNumber}.`};
  }

  // GPS ODO becomes a dated snapshot, not an overwrite of a single field —
  // this is what preserves weekly history for the "pending as of [date]" view.
  if(form.gpsOdo!=='' && form.gpsOdo!==null && form.gpsOdo!==undefined && snapshotDate){
    const already = STATE.data.odoSnapshots.find(s=>s.vehicleId===vehicle.id && s.snapshotDate===snapshotDate);
    if(already){ already.odo = numOrZero(form.gpsOdo); }
    else {
      STATE.data.odoSnapshots.push({
        id:uid(), vehicleId:vehicle.id, snapshotDate, odo:numOrZero(form.gpsOdo), enteredAt:new Date().toISOString()
      });
    }
  }

  STATE.data.services.push({
    id:uid(),
    vehicleId:vehicle.id,
    serviceNumber,
    doneDate: form.doneDate,
    doneKm: numOrZero(form.doneKm),
    snapshotDate: snapshotDate||'',
    enteredAt:new Date().toISOString()
  });
  return {ok:true, message:`${vehicleNumber} — Service #${serviceNumber} recorded.`};
}

function submitFeederEntry(form, snapshotDate){
  const result = validateAndRecordFeederRow(form, snapshotDate);
  if(!result.ok){ toast(result.message, 'err'); return false; }
  writeToFile();
  toast('Saved: ' + result.message, 'ok');
  maybeShowBackupReminder();
  return true;
}

const FEEDER_FIELD_ALIASES = {
  vehicleNumber: ['vehicle number','vehicle no','vehicle num'],
  gpsOdo: ['gps odo','odometer','gps odometer','current odometer'],
  doneDate: ['service done date','done date','service date'],
  doneKm: ['service done kms','service done km','done kms','done km'],
  serviceNumber: ['service number','service no','service num','service type']
};

/**
 * Bulk-imports a Feeder Excel file (the weekly Friday workflow). Every row
 * gets the exact same validation as a manual entry — rows that fail are
 * skipped and reported individually rather than aborting the whole batch,
 * since one bad row in 100 shouldn't block the other 99.
 */
function handleFeederExcelUpload(file, snapshotDate){
  if(!snapshotDate){ toast('Pick the snapshot date (which Friday this file is for) before uploading.', 'err'); return; }
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if(rows.length===0){ toast('That file has no data rows below the header.', 'err'); return; }

      const headerMap = buildHeaderMapGeneric(Object.keys(rows[0]), FEEDER_FIELD_ALIASES);
      if(!headerMap.vehicleNumber){
        toast('Could not find a "Vehicle Number" column in that file.', 'err');
        return;
      }

      let okCount=0, failCount=0;
      const failures=[];
      rows.forEach(r=>{
        const form = {
          vehicleNumber: headerMap.vehicleNumber ? r[headerMap.vehicleNumber] : '',
          gpsOdo: headerMap.gpsOdo ? r[headerMap.gpsOdo] : '',
          doneDate: headerMap.doneDate && r[headerMap.doneDate] ? toISO(r[headerMap.doneDate]) : '',
          doneKm: headerMap.doneKm ? r[headerMap.doneKm] : '',
          serviceNumber: headerMap.serviceNumber ? r[headerMap.serviceNumber] : ''
        };
        if(!String(form.vehicleNumber||'').trim()) return; // skip fully blank rows silently
        const result = validateAndRecordFeederRow(form, snapshotDate);
        if(result.ok){ okCount++; } else { failCount++; failures.push(result.message); }
      });

      writeToFile();
      let msg = `Imported ${okCount} entr${okCount===1?'y':'ies'} for ${fmtDate(snapshotDate)}.`;
      if(failCount) msg += ` ${failCount} row(s) skipped — see details below.`;
      toast(msg, okCount?'ok':'err');
      if(failures.length){
        STATE.ui.lastFeederUploadErrors = failures;
      } else {
        STATE.ui.lastFeederUploadErrors = null;
      }
      maybeShowBackupReminder();
      render();
    }catch(err){
      console.error(err);
      toast('Could not read that Excel file. Make sure it has Vehicle Number, GPS ODO, Service Done Date, Service Done Kms, and Service Number columns.', 'err');
    }
  };
  reader.readAsArrayBuffer(file);
}

function maybeShowBackupReminder(){
  const total = STATE.data.services.length;
  if(total>0 && total % 10 === 0){
    setTimeout(()=>{
      toast(`That's ${total} entries logged. Worth taking a backup — click "Export to Excel" in the sidebar.`, '');
    }, 900);
  }
}

function renderTopbar(){
  const titles = {
    vehicles:{t:'Vehicle Master', s:'Reference data — partner, mapcode, make & model, intervals, sale date'},
    feeder:{t:'Feeder Entry', s:'Weekly bulk upload of ODO and service records'},
    summary:{t:'Summary', s:'Live due/done status across all 40 services, per vehicle'},
    consolidated:{t:'Consolidated', s:'Flattened report — one row per recorded or due service event'},
    charts:{t:'Charts', s:'Visual breakdown of due/done status by partner and mapcode'},
    adh:{t:'Adh% Report', s:'Partner adherence scorecard — due, done, deviation buckets, high risk'},
    monthwise:{t:'MonthWise', s:'Mapcode summary by month or year, with bucket drill-down'}
  };
  const meta = titles[STATE.page];
  return `
  <div class="topbar">
    <div><div class="page-title">${meta.t}</div><div class="page-sub">${meta.s}</div></div>
    <div class="topbar-right">
      ${STATE.page==='vehicles'?`
        <button class="btn ghost sm" id="tb-template">📄 Download Template</button>
        <label class="btn sm" style="position:relative; overflow:hidden;">📤 Bulk Upload Excel<input type="file" id="tb-upload" accept=".xlsx,.xls" style="position:absolute; inset:0; opacity:0; cursor:pointer;"></label>
        <button class="btn amber sm" id="tb-add-vehicle">+ Add Vehicle</button>
      `:''}
      ${STATE.page==='feeder'?`<span class="pill">⌁ ${STATE.data.services.length} entries logged</span>`:''}
      ${STATE.page==='consolidated'?`<button class="btn amber sm" id="tb-download-consolidated">⬇ Download Consolidated</button>`:''}
    </div>
  </div>`;
}

function renderPage(){
  if(STATE.page==='vehicles') return renderVehiclesPage();
  if(STATE.page==='feeder') return renderFeederPage();
  if(STATE.page==='summary') return renderSummaryPage();
  if(STATE.page==='consolidated') return renderConsolidatedPage();
  if(STATE.page==='charts') return renderChartsPage();
  if(STATE.page==='adh') return renderAdhPage();
  if(STATE.page==='monthwise') return renderMonthWisePage();
  return '';
}

/* ----------------------------- Vehicles page ----------------------------- */

function renderVehiclesPage(){
  if(STATE.data.vehicles.length===0){
    return `
    <div class="panel">
      <div class="empty">
        <div class="empty-ico">🚖</div>
        <h4>No vehicles yet</h4>
        <p>Add your first vehicle manually, or download the Excel template, fill it with your fleet, and bulk-upload it. Odometer readings are uploaded separately every week, in Feeder.</p>
        <button class="btn amber" id="empty-add-vehicle">+ Add Vehicle</button>
      </div>
    </div>`;
  }
  const dueCount = STATE.data.vehicles.filter(v=>{
    const blocks = computeVehicleBlocks(v, '');
    return blocks.some(b=>b.dueVsDone==='Pending Against Due');
  }).length;

  return `
  <div class="stats">
    <div class="stat"><div class="stat-label">Total Vehicles</div><div class="stat-value">${STATE.data.vehicles.length}</div></div>
    <div class="stat brick"><div class="stat-label">Pending Against Due</div><div class="stat-value">${dueCount}</div></div>
    <div class="stat amber"><div class="stat-label">Services Logged</div><div class="stat-value">${STATE.data.services.length}</div></div>
    <div class="stat slate"><div class="stat-label">Partners</div><div class="stat-value">${new Set(STATE.data.vehicles.map(v=>v.partnerName).filter(Boolean)).size}</div></div>
    <div class="stat forest"><div class="stat-label">Avg. Flat Interval</div><div class="stat-value" style="font-size:16px;">${Math.round(STATE.data.vehicles.reduce((a,v)=>a+numOrZero(v.kmFlat),0)/STATE.data.vehicles.length)||0} km</div></div>
  </div>

  <div class="panel">
    <div class="panel-head"><h3>Fleet (${STATE.data.vehicles.length})</h3></div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>S.No</th><th>Vehicle No.</th><th>Partner</th><th>Mapcode</th><th>Make & Model</th>
          <th class="num">Svc1 Due</th><th class="num">Svc4+ Flat</th><th class="num">Latest ODO</th><th>Sale Date</th><th>Status</th><th></th>
        </tr></thead>
        <tbody>
        ${STATE.data.vehicles.map((v,i)=>{
          const blocks = computeVehicleBlocks(v, '');
          const pendingDue = blocks.find(b=>b.dueVsDone==='Pending Against Due');
          const latestOdo = getLatestOdo(v.id);
          return `
          <tr>
            <td class="mono">${i+1}</td>
            <td><a class="vehicle-link" data-vehicle-detail="${v.id}">${escapeHtml(v.vehicleNumber)}</a></td>
            <td>${escapeHtml(v.partnerName)}</td>
            <td class="mono" style="font-size:11.5px;">${escapeHtml(v.mapcode)}</td>
            <td>${escapeHtml(v.makeModel)}</td>
            <td class="num mono">${v.km1||''}km / ${v.day1||''}d</td>
            <td class="num mono">${v.kmFlat||''}km / ${v.dayFlat||''}d</td>
            <td class="num mono">${latestOdo ? latestOdo : '<span style="color:var(--slate-soft);">— no upload yet</span>'}</td>
            <td class="mono">${fmtDate(v.saleDate)}</td>
            <td>${pendingDue? `<span class="badge pending">PENDING SV#${pendingDue.serviceNumber}</span>` : `<span class="badge done">ON TRACK</span>`}</td>
            <td>
              <button class="btn ghost sm" data-edit-vehicle="${v.id}">Edit</button>
              <button class="btn ghost sm" data-del-vehicle="${v.id}">Delete</button>
            </td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function renderVehicleForm(vehicle){
  const v = vehicle || {vehicleNumber:'',partnerName:'',mapcode:'',makeModel:'',saleDate:'',
    km1:1000,kmInc2:4000,kmInc3:5000,kmFlat:10000, day1:30,dayInc2:150,dayInc3:185,dayFlat:365};
  return `
  <div class="form-grid">
    <div class="field"><label>Vehicle Number *</label><input id="f-vehicleNumber" value="${escapeHtml(v.vehicleNumber)}" placeholder="TG10T2344"></div>
    <div class="field"><label>Partner Name</label><input id="f-partnerName" value="${escapeHtml(v.partnerName)}" placeholder="Q FLEET PRIVATE LIMITED"></div>
    <div class="field"><label>Mapcode</label><input id="f-mapcode" class="mono" value="${escapeHtml(v.mapcode)}" placeholder="QFLT-HYD-4W-IC-N"></div>
    <div class="field"><label>Make & Model</label><input id="f-makeModel" value="${escapeHtml(v.makeModel)}" placeholder="MARUTI SUZUKI - WAGON R"></div>
    <div class="field full"><label>Sale Date *</label><input id="f-saleDate" type="date" value="${v.saleDate}"><span class="hint">Odometer is not entered here — it's uploaded weekly via Feeder</span></div>
  </div>

  <div class="section-label">Service Schedule — Kilometres</div>
  <p class="helptext" style="margin:-4px 0 10px;">Service 1 is a fixed threshold. Service 2/3 ADD to whatever was actually done at the previous service. Service 4 onward repeats the flat interval forever.</p>
  <div class="form-grid">
    <div class="field"><label>Service 1 Due (Km) *</label><input id="f-km1" type="number" class="mono" value="${v.km1}" placeholder="1000"></div>
    <div class="field"><label>Service 2 Increment (Km) *</label><input id="f-kmInc2" type="number" class="mono" value="${v.kmInc2}" placeholder="4000"><span class="hint">Added to actual Service 1 done km</span></div>
    <div class="field"><label>Service 3 Increment (Km) *</label><input id="f-kmInc3" type="number" class="mono" value="${v.kmInc3}" placeholder="5000"><span class="hint">Added to actual Service 2 done km</span></div>
    <div class="field"><label>Service 4+ Flat Interval (Km) *</label><input id="f-kmFlat" type="number" class="mono" value="${v.kmFlat}" placeholder="10000"><span class="hint">Repeats from Service 4 onward</span></div>
  </div>

  <div class="section-label">Service Schedule — Days</div>
  <div class="form-grid">
    <div class="field"><label>Service 1 Due (Days) *</label><input id="f-day1" type="number" class="mono" value="${v.day1}" placeholder="30"></div>
    <div class="field"><label>Service 2 Increment (Days) *</label><input id="f-dayInc2" type="number" class="mono" value="${v.dayInc2}" placeholder="150"></div>
    <div class="field"><label>Service 3 Increment (Days) *</label><input id="f-dayInc3" type="number" class="mono" value="${v.dayInc3}" placeholder="185"></div>
    <div class="field"><label>Service 4+ Flat Interval (Days) *</label><input id="f-dayFlat" type="number" class="mono" value="${v.dayFlat}" placeholder="365"></div>
  </div>`;
}

/* ----------------------------- Feeder page -------------------------------- */

function renderFeederPage(){
  const recent = [...STATE.data.services].sort((a,b)=> new Date(b.enteredAt) - new Date(a.enteredAt)).slice(0,12);
  const todayISO = toISO(new Date());
  const lastErrors = STATE.ui.lastFeederUploadErrors;
  return `
  <div class="panel" style="margin-bottom:20px;">
    <div class="panel-head"><h3>Weekly Bulk Upload</h3><div style="display:flex; gap:8px; align-items:center;"><button class="btn ghost sm" id="ff-template">📄 Download Template</button><span class="pill">Every Friday</span></div></div>
    <div class="panel-body">
      <div class="form-grid">
        <div class="field">
          <label>Snapshot Date (which Friday is this?) *</label>
          <input type="date" id="ff-snapshot-date" value="${escapeHtml(STATE.ui.feederSnapshotDate || todayISO)}">
          <span class="hint">Every vehicle's ODO and service rows in this file get tagged with this date — this is what lets Summary show "pending as of" any past Friday.</span>
        </div>
        <div class="field">
          <label>Excel File</label>
          <label class="btn" style="position:relative; overflow:hidden; justify-content:center;">📤 Choose Excel File<input type="file" id="ff-bulk-upload" accept=".xlsx,.xls" style="position:absolute; inset:0; opacity:0; cursor:pointer;"></label>
          <span class="hint">Columns expected: Vehicle Number, GPS ODO, Service Done Date, Service Done Kms, Service Number</span>
        </div>

/* ------------------------------- Adh% Report engine -------------------------------- */

/**
 * Builds the PMS Adh% report for one partner: per-service-number Due/Done/
 * Done-against-Due/Done-against-Not-Due/Pending/%Adher, plus the three bucket
 * distribution tables and High Risk figures. Mirrors the original "PMS -- Adhh%"
 * sheet exactly (confirmed bucket labels, confirmed 3-category High Risk split
 * on Done-against-Due, single High Risk on Done-against-Not-Due).
 *
 * @param {string} partnerName
 * @param {string} [asOfDate] - passed through to computeVehicleBlocks
 */
function buildAdhReport(partnerName, asOfDate){
  const vehicles = partnerName==='__ALL__'
    ? STATE.data.vehicles.slice()
    : STATE.data.vehicles.filter(v=>v.partnerName===partnerName);
  const perService = [];
  for(let n=1; n<=MAX_SERVICES; n++) perService.push({n, due:0, done:0, doneAgainstDue:0, doneAgainstNotDue:0, pending:0, lapsed:0});

  const doneAgainstDueBuckets = {}; DONE_BUCKET_LABELS.forEach(l=>doneAgainstDueBuckets[l]=0);
  const doneAgainstNotDueBuckets = {}; DONE_BUCKET_LABELS.forEach(l=>doneAgainstNotDueBuckets[l]=0);
  const pendingBuckets = {}; PENDING_BUCKET_LABELS.forEach(l=>pendingBuckets[l]=0);

  vehicles.forEach(v=>{
    const blocks = computeVehicleBlocks(v, asOfDate);
    blocks.forEach(b=>{
      const row = perService[b.serviceNumber-1];
      if(b.dueVsDone==='Done Against Due'){ row.done++; row.doneAgainstDue++; row.due++; doneAgainstDueBuckets[b.bucketDue] = (doneAgainstDueBuckets[b.bucketDue]||0)+1; if(b.isLapsed) row.lapsed++; }
      else if(b.dueVsDone==='Done Against Not Due'){ row.done++; row.doneAgainstNotDue++; doneAgainstNotDueBuckets[b.bucketNotDue] = (doneAgainstNotDueBuckets[b.bucketNotDue]||0)+1; }
      else if(b.dueVsDone==='Pending Against Due'){ row.pending++; row.due++; pendingBuckets[b.pendingBucket] = (pendingBuckets[b.pendingBucket]||0)+1; }
    });
  });

  perService.forEach(row=>{ row.adherPct = row.due>0 ? (row.done/row.due*100) : null; });

  const hr = STATE.highRiskSettings;
  const sumBuckets = (table, labels) => labels.reduce((a,l)=>a+(table[l]||0), 0);
  const totalDue = sumBuckets(doneAgainstDueBuckets, DONE_BUCKET_LABELS);
  const totalNotDue = sumBuckets(doneAgainstNotDueBuckets, DONE_BUCKET_LABELS);

  const highRisk = {
    overall: sumBuckets(doneAgainstDueBuckets, hr.doneAgainstDueOverall),
    postDue: sumBuckets(doneAgainstDueBuckets, hr.doneAgainstDuePostDue),
    beforeDue: sumBuckets(doneAgainstDueBuckets, hr.doneAgainstDueBeforeDue),
    notDue: sumBuckets(doneAgainstNotDueBuckets, hr.doneAgainstNotDue)
  };
  const highRiskPct = {
    overall: totalDue>0 ? highRisk.overall/totalDue*100 : null,
    postDue: totalDue>0 ? highRisk.postDue/totalDue*100 : null,
    beforeDue: totalDue>0 ? highRisk.beforeDue/totalDue*100 : null,
    notDue: totalNotDue>0 ? highRisk.notDue/totalNotDue*100 : null
  };

  return {
    partnerName, vehicleCount: vehicles.length, perService,
    doneAgainstDueBuckets, doneAgainstNotDueBuckets, pendingBuckets,
    totalDue, totalNotDue, totalLapsed: perService.reduce((a,r)=>a+r.lapsed,0),
    highRisk, highRiskPct
  };
}

/* Drill-down for ONE mapcode within a partner: Done-against-Due bucket
   distribution (month-filtered by Done Date) and Pending-against-Due bucket
   distribution (NOT month-filtered — confirmed: pending always reflects the
   chosen as-of-date snapshot, not the Done-date month window). */
function buildMapcodeDrilldown(mapcode, asOfDate, monthFrom, monthTo){
  const vehicles = STATE.data.vehicles.filter(v=>v.mapcode===mapcode);
  const doneBuckets = {}; DONE_BUCKET_LABELS.forEach(l=>doneBuckets[l]=0);
  const pendingBuckets = {}; PENDING_BUCKET_LABELS.forEach(l=>pendingBuckets[l]=0);
  vehicles.forEach(v=>{
    computeVehicleBlocks(v, asOfDate).forEach(b=>{
      if(b.dueVsDone==='Done Against Due' && b.doneDate){
        const inRange = (!monthFrom || b.doneDate>=monthFrom) && (!monthTo || b.doneDate<=monthTo);
        if(inRange) doneBuckets[b.bucketDue] = (doneBuckets[b.bucketDue]||0)+1;
      }
      if(b.dueVsDone==='Pending Against Due'){
        pendingBuckets[b.pendingBucket] = (pendingBuckets[b.pendingBucket]||0)+1;
      }
    });
  });
  return {mapcode, doneBuckets, pendingBuckets};
}

/* MonthWise per-mapcode summary table: Due, Done, Over-all Done, Done-against-Due,
   Done-against-Not-Due, Pending, plus the </1000km vs >1000km Done split and
   </1000km vs >1000km Pending split (confirmed from the original sheet's H/I/J/K
   columns). Done counts are filtered to the chosen month; Pending counts are
   NOT month-filtered (always reflect the current/as-of snapshot — confirmed). */
function buildMonthWiseSummary(year, month, asOfDate){
  const monthFrom = month ? `${year}-${String(month).padStart(2,'0')}-01` : `${year}-01-01`;
  const monthToDate = month ? new Date(year, month, 0) : new Date(year, 11, 31);
  const monthTo = toISO(monthToDate);

  const allMapcodes = Array.from(new Set(STATE.data.vehicles.map(v=>v.mapcode).filter(Boolean))).sort();
  const rows = allMapcodes.map(mapcode=>{
    const vehicles = STATE.data.vehicles.filter(v=>v.mapcode===mapcode);
    let due=0, done=0, doneAgainstDue=0, doneAgainstNotDue=0, pending=0, lapsed=0;
    let doneLessThan1000=0, doneMoreThan1000=0, pendingLessThan1000=0, pendingMoreThan1000=0;
    vehicles.forEach(v=>{
      computeVehicleBlocks(v, asOfDate).forEach(b=>{
        if(b.dueVsDone==='Done Against Due'){
          const inRange = b.doneDate && b.doneDate>=monthFrom && b.doneDate<=monthTo;
          if(inRange){
            due++; done++; doneAgainstDue++;
            if(b.devKm!==null && b.devKm<=1000) doneLessThan1000++; else doneMoreThan1000++;
            if(b.isLapsed) lapsed++;
          }
        } else if(b.dueVsDone==='Done Against Not Due'){
          const inRange = b.doneDate && b.doneDate>=monthFrom && b.doneDate<=monthTo;
          if(inRange){ done++; doneAgainstNotDue++; }
        } else if(b.dueVsDone==='Pending Against Due'){
          // not month-filtered — confirmed always current/as-of, regardless of month window
          due++; pending++;
          if(b.pendingKm!==null && b.pendingKm<1000) pendingLessThan1000++; else pendingMoreThan1000++;
        }
      });
    });
    return {mapcode, due, done, doneAgainstDue, doneAgainstNotDue, pending, lapsed,
      doneLessThan1000, doneMoreThan1000, pendingLessThan1000, pendingMoreThan1000,
      adherPct: due>0 ? (done/due*100) : null};
  });
  return rows;
}

const CHART_COLORS = ['#D97D3D','#3C7A5C','#B5453E','#5C6B7A','#C9A227','#15233B','#8A95A3','#9A5320'];

function getChartFilteredVehicles(){
  const mapcodeFilter = STATE.ui.chartsMapcodeFilter;
  const partnerFilter = STATE.ui.chartsPartnerFilter;
  return STATE.data.vehicles.filter(v=>
    (!mapcodeFilter || v.mapcode===mapcodeFilter) &&
    (!partnerFilter || v.partnerName===partnerFilter)
  );
}

/* Builds the three datasets the charts need, applying the shared filter bar
   (Mapcode, Partner, and a service-date range that scopes which Done events count). */
function buildChartData(){
  const vehicles = getChartFilteredVehicles();
  const dateFrom = STATE.ui.chartsDateFrom;
  const dateTo = STATE.ui.chartsDateTo;
  const groupBy = STATE.ui.chartsGroupBy || 'partner';

  let doneCount=0, pendingCount=0;
  const byGroupVehicleCount = {};
  const byGroupPendingCount = {};

  vehicles.forEach(v=>{
    const groupKey = (groupBy==='mapcode' ? v.mapcode : v.partnerName) || '(unassigned)';
    byGroupVehicleCount[groupKey] = (byGroupVehicleCount[groupKey]||0) + 1;

    const blocks = computeVehicleBlocks(v, '');
    blocks.forEach(b=>{
      if(b.status==='Done' && b.doneDate){
        const inRange = (!dateFrom || b.doneDate>=dateFrom) && (!dateTo || b.doneDate<=dateTo);
        if(inRange) doneCount++;
      }
      if(b.dueVsDone==='Pending Against Due'){
        // a date range doesn't really apply to "currently pending" (there's no done date to range against),
        // so pending counts reflect the Mapcode/Partner filters only — consistent with how Summary's "as of" works.
        pendingCount++;
        byGroupPendingCount[groupKey] = (byGroupPendingCount[groupKey]||0) + 1;
      }
    });
  });

  return { doneCount, pendingCount, byGroupVehicleCount, byGroupPendingCount, groupBy };
}

let CHART_INSTANCES = {};
function destroyCharts(){
  Object.values(CHART_INSTANCES).forEach(c=>{ try{ c.destroy(); }catch(e){} });
  CHART_INSTANCES = {};
}

function renderChartsJS(){
  if(typeof Chart==='undefined') return;
  destroyCharts();
  const data = buildChartData();

  const elDP = document.getElementById('chart-done-pending');
  if(elDP){
    CHART_INSTANCES.donePending = new Chart(elDP, {
      type:'pie',
      data:{
        labels:['Done','Pending Against Due'],
        datasets:[{ data:[data.doneCount, data.pendingCount], backgroundColor:['#3C7A5C','#B5453E'] }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{position:'bottom', labels:{font:{size:12}}},
          tooltip:{callbacks:{label:(ctx)=>`${ctx.label}: ${ctx.parsed} (${((ctx.parsed/(data.doneCount+data.pendingCount||1))*100).toFixed(1)}%)`}},
          datalabels: undefined
        }
      },
      plugins:[{
        id:'dataLabelsDP',
        afterDatasetsDraw(chart){
          const {ctx} = chart;
          chart.getDatasetMeta(0).data.forEach((arc,i)=>{
            const val = chart.data.datasets[0].data[i];
            if(!val) return;
            const pos = arc.tooltipPosition();
            ctx.save();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(val, pos.x, pos.y);
            ctx.restore();
          });
        }
      }]
    });
  }

  const elGroup = document.getElementById('chart-by-group');
  if(elGroup){
    const labels = Object.keys(data.byGroupVehicleCount);
    const values = labels.map(l=>data.byGroupVehicleCount[l]);
    CHART_INSTANCES.byGroup = new Chart(elGroup, {
      type:'pie',
      data:{ labels, datasets:[{ data:values, backgroundColor:labels.map((_,i)=>CHART_COLORS[i%CHART_COLORS.length]) }] },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{position:'bottom', labels:{font:{size:11}, boxWidth:12}},
          tooltip:{callbacks:{label:(ctx)=>`${ctx.label}: ${ctx.parsed} vehicle(s)`}} }
      },
      plugins:[{
        id:'dataLabelsGroup',
        afterDatasetsDraw(chart){
          const {ctx} = chart;
          chart.getDatasetMeta(0).data.forEach((arc,i)=>{
            const val = chart.data.datasets[0].data[i];
            if(!val) return;
            const pos = arc.tooltipPosition();
            ctx.save();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 11px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(val, pos.x, pos.y);
            ctx.restore();
          });
        }
      }]
    });
  }

  const elBar = document.getElementById('chart-pending-bar');
  if(elBar){
    const labels = Object.keys(data.byGroupVehicleCount);
    const values = labels.map(l=>data.byGroupPendingCount[l]||0);
    CHART_INSTANCES.pendingBar = new Chart(elBar, {
      type:'bar',
      data:{ labels, datasets:[{ label:'Pending Against Due', data:values, backgroundColor:'#D97D3D', borderRadius:4 }] },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:(ctx)=>`${ctx.parsed.y} pending`}}
        },
        scales:{ y:{ beginAtZero:true, ticks:{precision:0} } }
      },
      plugins:[{
        id:'dataLabelsBar',
        afterDatasetsDraw(chart){
          const {ctx} = chart;
          chart.getDatasetMeta(0).data.forEach((bar,i)=>{
            const val = chart.data.datasets[0].data[i];
            ctx.save();
            ctx.fillStyle = '#15233B';
            ctx.font = 'bold 12px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(val, bar.x, bar.y - 6);
            ctx.restore();
          });
